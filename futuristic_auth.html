<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USD.Pro - Authentification Futuriste</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              dark: '#090909',
              light: '#f8fafc',
              accent: '#3b82f6',
              purple: '#a855f7',
              orange: '#f97316'
            }
          },
          animation: {
            'fadeIn': 'fadeIn 0.6s ease-out forwards',
            'float': 'float 6s ease-in-out infinite',
            'pulse-glow': 'pulseGlow 3s ease-in-out infinite'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(15px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-15px)' }
            },
            pulseGlow: {
              '0%, 100%': { opacity: '0.4', filter: 'blur(40px)' },
              '50%': { opacity: '0.8', filter: 'blur(60px)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Premium details */
    .bg-grid {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(128, 128, 128, 0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(128, 128, 128, 0.05) 1px, transparent 1px);
    }
    .dark .bg-grid {
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    }
    .glass-card {
      backdrop-filter: blur(24px);
    }
  </style>
</head>
<body class="bg-brand-light dark:bg-brand-dark text-slate-800 dark:text-white min-h-screen flex flex-col justify-between font-sans bg-grid transition-colors duration-500 overflow-x-hidden relative">

  <!-- Ambient glowing spheres -->
  <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-brand-purple/20 dark:bg-brand-purple/10 pointer-events-none animate-pulse-glow"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-brand-orange/20 dark:bg-brand-orange/10 pointer-events-none animate-pulse-glow" style="animation-delay: 1.5s;"></div>

  <!-- HEADER / NAVBAR -->
  <header class="w-full max-w-7xl mx-auto px-6 sm:px-8 h-20 flex items-center justify-between z-10">
    <!-- Left Navigation -->
    <div class="flex items-center space-x-12">
      <a href="#" class="text-2xl font-black tracking-tighter">
        USD<span class="text-brand-accent">.Pro</span>
      </a>
      <nav class="hidden lg:flex items-center space-x-8 text-sm font-semibold text-slate-500 dark:text-slate-400">
        <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Home</a>
        <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">About</a>
        <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Blog</a>
        <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Pages</a>
        <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Contact</a>
      </nav>
    </div>

    <!-- Right Controls -->
    <div class="flex items-center space-x-6">
      <!-- Theme Switcher -->
      <button id="themeToggle" class="p-2.5 rounded-full bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:bg-slate-200 dark:hover:bg-white/10 transition cursor-pointer" title="Changer de thème">
        <!-- Sun icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-800 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <!-- Moon icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-yellow-400 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>

      <!-- Language Selector -->
      <div class="relative">
        <button id="langDropdownBtn" class="flex items-center space-x-1.5 text-sm font-bold bg-slate-100 dark:bg-white/5 px-4 py-2.5 border border-slate-200 dark:border-white/10 rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition cursor-pointer">
          <span id="currentLang">FR</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div id="langDropdown" class="hidden absolute right-0 mt-2 w-28 bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 rounded-2xl shadow-xl overflow-hidden z-20">
          <button onclick="setLang('FR')" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-100 dark:hover:bg-white/5 font-semibold transition cursor-pointer">Français (FR)</button>
          <button onclick="setLang('EN')" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-100 dark:hover:bg-white/5 font-semibold transition cursor-pointer">English (EN)</button>
        </div>
      </div>

      <!-- Auth actions -->
      <button onclick="switchMode('login')" class="hidden sm:inline text-sm font-semibold text-slate-700 dark:text-slate-300 hover:text-brand-accent transition cursor-pointer">Sign In</button>
      <button onclick="switchMode('register')" class="bg-brand-dark dark:bg-white text-white dark:text-brand-dark px-6 py-2.5 rounded-full text-sm font-bold hover:opacity-90 hover:shadow-lg transition cursor-pointer border border-slate-200 dark:border-transparent">Register</button>
    </div>
  </header>

  <!-- MAIN CARD CONTAINER -->
  <main class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-center z-10 flex-1">
    <div class="w-full max-w-[1200px] min-h-[700px] rounded-[30px] overflow-visible bg-white/70 dark:bg-[#121212]/40 border border-slate-200/50 dark:border-white/10 glass-card shadow-2xl flex flex-col md:flex-row relative animate-fadeIn">
      
      <!-- LEFT SECTION (55% width, illustration) -->
      <div class="hidden md:flex md:w-[55%] rounded-l-[30px] p-8 items-center justify-center relative overflow-visible select-none">
        <!-- Floating overlay mesh & neon card illustration -->
        <div class="w-full h-full relative flex items-center justify-center animate-float">
          <!-- Ambient card glow behind -->
          <div class="absolute w-[80%] h-[80%] bg-gradient-to-tr from-brand-purple via-brand-accent to-brand-orange rounded-3xl opacity-20 filter blur-3xl"></div>
          
          <!-- Cyberpunk glowing vector illustration -->
          <svg viewBox="0 0 500 500" class="w-[95%] h-[95%] relative z-10 overflow-visible">
            <defs>
              <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a855f7" />
                <stop offset="100%" stop-color="#3b82f6" />
              </linearGradient>
              <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f97316" />
                <stop offset="100%" stop-color="#a855f7" />
              </linearGradient>
              <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8" />
                <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1" />
              </linearGradient>
              <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="15" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>

            <!-- Background Grid Structure -->
            <path d="M 50,150 L 450,150 M 50,250 L 450,250 M 50,350 L 450,350 M 150,50 L 150,450 M 250,50 L 250,450 M 350,50 L 350,450" 
                  stroke="url(#lineGrad)" stroke-width="1.5" stroke-dasharray="10 15" />
                  
            <!-- Tech glowing mesh line -->
            <path d="M 50,400 Q 150,100 250,250 T 450,100" fill="none" stroke="url(#purpleGrad)" stroke-width="4" filter="url(#neonGlow)" />
            <path d="M 50,300 Q 200,450 300,200 T 450,380" fill="none" stroke="url(#orangeGrad)" stroke-width="3" filter="url(#neonGlow)" />

            <!-- Floating Glassmorphic Isometric Node Card (Slightly overflows) -->

              <!-- Rounded rect border -->

              <!-- Glow outline -->

              <!-- Inside chips & rings -->
              <circle cx="50" cy="50" r="22" fill="url(#purpleGrad)" opacity="0.85" />
              <rect x="38" y="110" width="124" height="12" rx="6" fill="rgba(255, 255, 255, 0.2)" />
              <rect x="38" y="135" width="80" height="10" rx="5" fill="rgba(255, 255, 255, 0.1)" />
              
              <rect x="38" y="180" width="124" height="45" rx="12" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
              <circle cx="65" cy="202" r="10" fill="#f97316" />
              <line x1="90" y1="197" x2="140" y2="197" stroke="rgba(255, 255, 255, 0.3)" stroke-width="3" stroke-linecap="round" />
              <line x1="90" y1="207" x2="120" y2="207" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2.5" stroke-linecap="round" />
            </g>
            
            <!-- Nodes connections circles -->
            <circle cx="250" cy="250" r="8" fill="#3b82f6" filter="url(#neonGlow)" />
            <circle cx="150" cy="100" r="6" fill="#a855f7" filter="url(#neonGlow)" />
            <circle cx="350" cy="380" r="7" fill="#f97316" filter="url(#neonGlow)" />
          </svg>
        </div>
      </div>

      <!-- RIGHT SECTION (45% width, Auth Form) -->
      <div class="w-full md:w-[45%] p-8 sm:p-12 flex flex-col justify-center relative border-t md:border-t-0 md:border-l border-slate-200/50 dark:border-white/10 rounded-r-[30px]">
        
        <!-- Toggle internal tabs for dynamic UI switching -->
        <div class="space-y-6">
          <header class="space-y-1">
            <span id="authGreeting" class="text-sm font-semibold text-brand-purple dark:text-purple-400">Hello!</span>

          <!-- Error Alert Banner -->
          <div id="authAlert" class="hidden p-4 bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-900/50 text-red-600 dark:text-red-400 rounded-2xl text-xs font-bold text-center"></div>

          <!-- Form Fields -->
          <form id="authForm" onsubmit="handleAuthSubmit(event)" class="space-y-4">
            
            <!-- Username/Full Name Input (Hidden in Login by default) -->
            <div id="fullNameGroup" class="hidden space-y-1.5 transition-all">
              <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Full Name</label>
              <div class="relative">
                <input 
                  type="text" 
                  id="fullNameInput"
                  placeholder="John Doe"

                />

                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </div>
              </div>
            </div>

            <!-- Email Input -->

              <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Email</label>
              <div class="relative">
                <input 
                  type="email" 
                  required
                  id="emailInput"
                  placeholder="client@usd.com" 
                  class="w-full pl-11 pr-4 py-3 rounded-2xl border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-white/5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-accent dark:focus:ring-brand-purple focus:border-transparent text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-white/20 transition-all"
                />
                <div class="absolute left-4 top-3.5 text-slate-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                  </svg>

            </div>

            <!-- Password Input -->

                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Password</label>

              <div class="relative">

                />
                <div class="absolute left-4 top-3.5 text-slate-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                  </svg>
                </div>
                <!-- Toggle password eye button -->
                <button type="button" id="togglePasswordBtn" class="absolute right-4 top-3 text-slate-400 hover:text-slate-600 dark:hover:text-white cursor-pointer">

                  </svg>
                  <!-- Eye icon closed -->
                  <svg xmlns="http://www.w3.org/2000/svg" id="eyeClosedIcon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                  </svg>

              </div>
            </div>

            <!-- Submit Button -->
            <button 
              type="submit" 
              id="submitAuthBtn"
              class="w-full py-3.5 mt-2 bg-slate-900 dark:bg-white text-white dark:text-brand-dark rounded-2xl font-bold hover:shadow-lg dark:hover:shadow-purple-500/10 hover:opacity-90 active:scale-95 transition-all cursor-pointer"
            >
              Sign In

          <!-- Divider -->
          <div class="flex items-center my-6">
            <div class="flex-1 border-t border-slate-200 dark:border-white/10"></div>
            <span id="dividerText" class="px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Or continue with</span>
            <div class="flex-1 border-t border-slate-200 dark:border-white/10"></div>
          </div>

          <!-- Social buttons -->
          <div class="grid grid-cols-3 gap-4">
            <!-- Google -->
            <button class="py-3 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-200 dark:hover:bg-white/10 transition-all flex items-center justify-center cursor-pointer">

                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.77c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05" />
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335" />
              </svg>
            </button>
            <!-- Apple -->
            <button class="py-3 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-200 dark:hover:bg-white/10 transition-all flex items-center justify-center cursor-pointer">
              <svg class="w-5 h-5 text-slate-800 dark:text-white" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.22.67-2.94 1.5-.64.73-1.2 1.87-1.05 2.97 1.1.09 2.25-.56 3-1.41z"/>
              </svg>
            </button>
            <!-- Facebook -->
            <button class="py-3 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-200 dark:hover:bg-white/10 transition-all flex items-center justify-center cursor-pointer">
              <svg class="w-5 h-5 text-[#1877F2]" viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>

          <!-- Toggle Bottom Mode Link -->

            <span id="bottomToggleText">Don’t have an account?</span> 
            <a href="#" onclick="toggleAuthMode(event)" id="bottomToggleBtn" class="text-brand-accent dark:text-purple-400 font-bold hover:underline">Create Account</a>
          </p>
        </div>

      </div>
    </div>

  <!-- FOOTER -->
  <footer class="w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center text-xs text-slate-400 z-10 border-t border-slate-200/50 dark:border-white/5 mt-auto">
    <span>© 2026 USD.Pro. All rights reserved.</span>
    <div class="flex space-x-4">
      <a href="#" class="hover:text-slate-600 dark:hover:text-white transition">Privacy Policy</a>
      <a href="#" class="hover:text-slate-600 dark:hover:text-white transition">Terms of Service</a>
    </div>

  <!-- JAVASCRIPT FOR THEME TOGGLE, PASSWORD VISIBILITY & MODE TOGGLE -->
  <script>
    // Theme toggle logic
    const htmlEl = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');

    themeToggle.addEventListener('click', () => {
      htmlEl.classList.toggle('dark');
      localStorage.setItem('theme', htmlEl.classList.contains('dark') ? 'dark' : 'light');
    });

    // Check system preference
    if (localStorage.getItem('theme') === 'light') {
      htmlEl.classList.remove('dark');
    }

    // Language dropdown toggle
    const langDropdownBtn = document.getElementById('langDropdownBtn');
    const langDropdown = document.getElementById('langDropdown');
    const currentLang = document.getElementById('currentLang');

    langDropdownBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      langDropdown.classList.toggle('hidden');
    });

    window.addEventListener('click', () => {
      langDropdown.classList.add('hidden');
    });

    function setLang(langCode) {
      currentLang.textContent = langCode;
      langDropdown.classList.add('hidden');
      updateLocalization(langCode);
    }

    // Localization Dictionary
    const langDict = {
      FR: {
        greetingLogin: "Bonjour !",
        greetingRegister: "Commençons !",
        headingLogin: "Bon retour",
        headingRegister: "Créer un compte",
        email: "Adresse e-mail",
        password: "Mot de passe",
        fullName: "Nom complet",
        recover: "Mot de passe oublié ?",
        signIn: "Se connecter",
        signUp: "S'inscrire",
        divider: "Ou continuer avec",
        noAccount: "Pas encore de compte ?",
        hasAccount: "Déjà un compte ?",
        createBtn: "Créer un compte",
        loginBtn: "Se connecter",
        authSuccess: "Authentification réussie !",
        authError: "Identifiants incorrects ou invalides."
      },
      EN: {
        greetingLogin: "Hello!",
        greetingRegister: "Let's Start!",
        headingLogin: "Welcome Back",
        headingRegister: "Create Account",
        email: "Email",
        password: "Password",
        fullName: "Full Name",
        recover: "Recover Password?",
        signIn: "Sign In",
        signUp: "Sign Up",
        divider: "Or continue with",
        noAccount: "Don’t have an account?",
        hasAccount: "Already have an account?",
        createBtn: "Create Account",
        loginBtn: "Sign In",
        authSuccess: "Authentication successful!",
        authError: "Invalid or incorrect credentials."
      }
    };

    let activeLang = 'FR';

    function updateLocalization(langCode) {
      activeLang = langCode;
      const dict = langDict[langCode];
      
      const isRegister = currentMode === 'register';
      
      document.getElementById('authGreeting').textContent = isRegister ? dict.greetingRegister : dict.greetingLogin;
      document.getElementById('authHeading').textContent = isRegister ? dict.headingRegister : dict.headingLogin;
      document.getElementById('recoverPassLink').textContent = dict.recover;
      document.getElementById('submitAuthBtn').textContent = isRegister ? dict.signUp : dict.signIn;
      document.getElementById('dividerText').textContent = dict.divider;
      document.getElementById('bottomToggleText').textContent = isRegister ? dict.hasAccount : dict.noAccount;
      document.getElementById('bottomToggleBtn').textContent = isRegister ? dict.loginBtn : dict.createBtn;
    }

    // Password Visibility Toggle
    const passwordInput = document.getElementById('passwordInput');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');
    const eyeOpenIcon = document.getElementById('eyeOpenIcon');
    const eyeClosedIcon = document.getElementById('eyeClosedIcon');

    togglePasswordBtn.addEventListener('click', () => {
      const isPassword = passwordInput.getAttribute('type') === 'password';
      passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
      if (isPassword) {
        eyeOpenIcon.classList.add('hidden');
        eyeClosedIcon.classList.remove('hidden');
      } else {
        eyeOpenIcon.classList.remove('hidden');
        eyeClosedIcon.classList.add('hidden');
      }
    });

    // Dynamic mode switching (Login vs Register)
    let currentMode = 'login'; // 'login' or 'register'
    const fullNameGroup = document.getElementById('fullNameGroup');
    const recoverPassLink = document.getElementById('recoverPassLink');

    function switchMode(mode) {
      currentMode = mode;
      const dict = langDict[activeLang];
      
      const authAlert = document.getElementById('authAlert');
      authAlert.classList.add('hidden');

      if (mode === 'register') {
        fullNameGroup.classList.remove('hidden');
        recoverPassLink.classList.add('invisible'); // hide but preserve space
        document.getElementById('authGreeting').textContent = dict.greetingRegister;
        document.getElementById('authHeading').textContent = dict.headingRegister;
        document.getElementById('submitAuthBtn').textContent = dict.signUp;
        document.getElementById('bottomToggleText').textContent = dict.hasAccount;
        document.getElementById('bottomToggleBtn').textContent = dict.loginBtn;
      } else {
        fullNameGroup.classList.add('hidden');
        recoverPassLink.classList.remove('invisible');
        document.getElementById('authGreeting').textContent = dict.greetingLogin;
        document.getElementById('authHeading').textContent = dict.headingLogin;
        document.getElementById('submitAuthBtn').textContent = dict.signIn;
        document.getElementById('bottomToggleText').textContent = dict.noAccount;
        document.getElementById('bottomToggleBtn').textContent = dict.createBtn;
      }
    }

    function toggleAuthMode(e) {
      e.preventDefault();
      if (currentMode === 'login') {
        switchMode('register');
      } else {
        switchMode('login');
      }
    }

    // Submit handler simulation
    function handleAuthSubmit(event) {
      event.preventDefault();
      const email = document.getElementById('emailInput').value;
      const password = passwordInput.value;
      const dict = langDict[activeLang];
      const authAlert = document.getElementById('authAlert');

      // Simple premium client verification simulation
      if (email === 'client@usd.com' && password === '12345678') {
        authAlert.classList.remove('hidden', 'bg-red-50', 'dark:bg-red-950/30', 'border-red-200', 'dark:border-red-900/50', 'text-red-600', 'dark:text-red-400');
        authAlert.classList.add('bg-green-50', 'dark:bg-green-950/30', 'border-green-200', 'dark:border-green-900/50', 'text-green-600', 'dark:text-green-400');
        authAlert.textContent = dict.authSuccess;
        
        // Simulation of redirected home access
        setTimeout(() => {
          window.location.href = "/";
        }, 1500);
      } else {
        authAlert.classList.remove('hidden', 'bg-green-50', 'dark:bg-green-950/30', 'border-green-200', 'dark:border-green-900/50', 'text-green-600', 'dark:text-green-400');
        authAlert.classList.add('bg-red-50', 'dark:bg-red-950/30', 'border-red-200', 'dark:border-red-900/50', 'text-red-600', 'dark:text-red-400');
        authAlert.textContent = dict.authError;
      }
    }
  </script>
</body>
</html>
